name: Execute Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
    - uses: actions/checkout@v4

    - name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    # --no-editable: build a real wheel so files install at
    # site-packages/pyarrow/bigquery/ (co-located with pyarrow itself).
    # An editable install only adds src/ to sys.path, which doesn't extend
    # pyarrow's __path__ because pyarrow is a regular package, not PEP 420.
    - name: Sync dependencies
      run: uv sync --locked --python ${{ matrix.python-version }} --no-editable

    - name: Lint with ruff
      run: uv run --no-sync --python ${{ matrix.python-version }} ruff check

    - name: Test with pytest
      run: uv run --no-sync --python ${{ matrix.python-version }} pytest
